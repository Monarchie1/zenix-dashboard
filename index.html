<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tableau de bord Zenix</title>
<style>
    :root {
        --bg-main: #0f0f0f;
        --bg-secondary: #1a1a1a;
        --card-bg: #1f1f1f;
        --text-main: #ffffff;
        --text-secondary: #b3b3b3;
        --accent: #6c5ce7;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg-main);
        color: var(--text-main);
        display: flex;
    }

    .sidebar {
        width: 230px;
        background: var(--bg-secondary);
        height: 100vh;
        padding: 20px;
        box-sizing: border-box;
        position: fixed;
    }

    .logo {
        font-size: 22px;
        font-weight: bold;
        color: var(--accent);
        margin-bottom: 30px;
    }

    .sidebar a {
        display: block;
        padding: 12px;
        margin-bottom: 10px;
        color: var(--text-secondary);
        text-decoration: none;
        border-radius: 6px;
        transition: 0.2s;
    }

    .sidebar a:hover,
    .sidebar a.active {
        background: var(--accent);
        color: white;
    }

    .main {
        margin-left: 250px;
        padding: 30px;
        width: calc(100% - 250px);
    }

    .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
        margin-top: 20px;
    }

    .card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 10px;
        transition: 0.2s;
    }

    .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 0 10px var(--accent);
    }

    .card-title {
        font-size: 14px;
        color: var(--text-secondary);
    }

    .card-value {
        font-size: 26px;
        margin-top: 10px;
        font-weight: bold;
    }
</style>
</head>
<body>

<div class="sidebar">
    <div class="logo">Zenix</div>
    <a class="active">Tableau de bord</a>
    <a>Statistiques</a>
    <a>Utilisateurs</a>
    <a>Paramètres</a>
</div>

<div class="main">
    <h1>Tableau de bord</h1>

    <div class="cards">
        <div class="card">
            <div class="card-title">Serveurs actifs</div>
            <div class="card-value" id="servers">0</div>
        </div>

        <div class="card">
            <div class="card-title">Joueurs connectés</div>
            <div class="card-value" id="players">0</div>
        </div>

        <div class="card">
            <div class="card-title">Commandes exécutées</div>
            <div class="card-value" id="commands">0</div>
        </div>
    </div>
</div>

<script>
// Exemple : remplacer par TES vraies API
async function updateStats() {
    try {
        // Exemple d'API (à remplacer)
        const servers = 12;   // nombre de serveurs
        const players = 248;  // nombre de joueurs
        const commands = 532; // nombre de commandes

        document.getElementById("servers").textContent = servers;
        document.getElementById("players").textContent = players;
        document.getElementById("commands").textContent = commands;

    } catch (e) {
        console.error("Erreur lors de la mise à jour :", e);
    }
}

// Mise à jour toutes les 5 secondes
updateStats();
setInterval(updateStats, 5000);
</script>

</body>
</html>
