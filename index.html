<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Tableau de bord Zenix - Thème Sombre</title>
<style>
    :root {
        --bg-main: #0f0f0f;
        --bg-secondary: #1a1a1a;
        --card-bg: #1f1f1f;
        --text-main: #ffffff;
        --text-secondary: #b3b3b3;
        --accent: #6c5ce7;
    }

    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg-main);
        color: var(--text-main);
        display: flex;
    }

    /* ====== BARRE LATERALE ====== */
    .sidebar {
        width: 230px;
        background: var(--bg-secondary);
        height: 100vh;
        padding: 20px;
        box-sizing: border-box;
        position: fixed;
    }

    .logo {
        font-size: 22px;
        font-weight: bold;
        color: var(--accent);
        margin-bottom: 30px;
    }

    .sidebar a {
        display: block;
        padding: 12px;
        margin-bottom: 10px;
        color: var(--text-secondary);
        text-decoration: none;
        border-radius: 6px;
        transition: 0.2s;
    }

    .sidebar a:hover,
    .sidebar a.active {
        background: var(--accent);
        color: white;
    }

    /* ====== CONTENU PRINCIPAL ====== */
    .main {
        margin-left: 250px;
        padding: 30px;
        width: calc(100% - 250px);
    }

    h1 {
        margin-top: 0;
    }

    /* ====== CARTES ====== */
    .cards {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-top: 20px;
    }

    .card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 10px;
        transition: 0.2s;
    }

    .card:hover {
        transform: translateY(-4px);
        box-shadow: 0 0 10px var(--accent);
    }

    .card-title {
        font-size: 14px;
        color: var(--text-secondary);
    }

    .card-value {
        font-size: 26px;
        margin-top: 10px;
        font-weight: bold;
    }

    /* ====== TABLEAU ====== */
    table {
        width: 100%;
        margin-top: 40px;
        border-collapse: collapse;
        background: var(--card-bg);
        border-radius: 10px;
        overflow: hidden;
    }

    th, td {
        padding: 15px;
        text-align: left;
    }

    th {
        background: var(--accent);
    }

    tr:nth-child(even) {
        background: #2a2a2a;
    }

    tr:hover {
        background: #333333;
    }
</style>
</head>
<body>

<!-- ====== BARRE LATERALE ====== -->
<div class="sidebar">
    <div class="logo">Zenix</div>
    <a class="active">Tableau de bord</a>
    <a>Statistiques</a>
    <a>Utilisateurs</a>
    <a>Paramètres</a>
</div>

<!-- ====== CONTENU PRINCIPAL ====== -->
<div class="main">
    <h1>Tableau de bord</h1>

    <!-- ====== CARTES ====== -->
    <div class="cards">
        <div class="card">
            <div class="card-title">Utilisateurs</div>
            <div class="card-value">1 248</div>
        </div>
        <div class="card">
            <div class="card-title">Revenus</div>
            <div class="card-value">12 540 €</div>
        </div>
        <div class="card">
            <div class="card-title">Conversions</div>
            <div class="card-value">4,8%</div>
        </div>
        <div class="card">
            <div class="card-title">Tickets ouverts</div>
            <div class="card-value">32</div>
        </div>
    </div>

    <!-- ====== TABLEAU ====== -->
    <table>
        <tr>
            <th>Nom</th>
            <th>Statut</th>
            <th>Rôle</th>
        </tr>
        <tr>
            <td>Alex Martin</td>
            <td>Actif</td>
            <td>Administrateur</td>
        </tr>
        <tr>
            <td>Sarah Dupont</td>
            <td>Inactif</td>
            <td>Utilisateur</td>
        </tr>
        <tr>
            <td>Louis Bernard</td>
            <td>Actif</td>
            <td>Modérateur</td>
        </tr>
    </table>

</div>

</body>
</html>
